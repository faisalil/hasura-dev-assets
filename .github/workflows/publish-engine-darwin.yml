name: Publish Engine Darwin

on:
  workflow_dispatch:
    inputs:
      engine_tag:
        description: "Tag from hasura/graphql-engine to build (e.g. v2.48.12)"
        required: true
        default: "v2.48.12"
      release_tag:
        description: "Release tag in this assets repo (e.g. v2.48.12)"
        required: true
        default: "v2.48.12"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14
    env:
      ENGINE_TAG: ${{ github.event.inputs.engine_tag }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout assets repo
        uses: actions/checkout@v4

      - name: Checkout hasura/graphql-engine
        uses: actions/checkout@v4
        with:
          repository: hasura/graphql-engine
          ref: ${{ env.ENGINE_TAG }}
          path: graphql-engine-src

      - name: Setup Haskell (GHC + cabal)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.2"
          cabal-version: "3.12.1.0"

      - name: Install build dependencies
        run: |
          brew update
          brew install pcre unixodbc libpq openssl@3

      - name: Prepare build config
        working-directory: graphql-engine-src
        run: |
          ln -sf cabal/dev-sh.project.local cabal.project.local
          echo "${ENGINE_TAG#v}" > server/CURRENT_VERSION

      - name: Build graphql-engine (darwin-arm64)
        working-directory: graphql-engine-src
        run: |
          cabal update
          cabal build exe:graphql-engine --project-file=cabal/dev-sh.project

      - name: Package artifacts
        run: |
          ENGINE_BIN="$(cd graphql-engine-src && cabal list-bin exe:graphql-engine --project-file=cabal/dev-sh.project)"
          cp "${ENGINE_BIN}" graphql-engine-darwin-arm64
          chmod +x graphql-engine-darwin-arm64
          DARWIN_SHA="$(shasum -a 256 graphql-engine-darwin-arm64 | awk '{print $1}')"
          RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          DARWIN_URL="${RELEASE_BASE_URL}/graphql-engine-darwin-arm64"
          chmod +x scripts/generate-manifest.sh
          scripts/generate-manifest.sh "${RELEASE_TAG}" "${RELEASE_BASE_URL}" "${DARWIN_URL}" "${DARWIN_SHA}"

      - name: Create release if missing
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "graphql-engine darwin-arm64 asset + manifest for Hasura dev runtime"
          fi

      - name: Upload release assets
        run: |
          gh release upload "${RELEASE_TAG}" graphql-engine-darwin-arm64 manifest.json checksums.txt --clobber

      - name: Verify release URLs
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          curl -fL "${BASE_URL}/manifest.json" >/dev/null
          curl -fL "${BASE_URL}/graphql-engine-darwin-arm64" -o /tmp/graphql-engine-darwin-arm64
          EXPECTED="$(awk '{print $1}' checksums.txt)"
          ACTUAL="$(shasum -a 256 /tmp/graphql-engine-darwin-arm64 | awk '{print $1}')"
          test "${EXPECTED}" = "${ACTUAL}"
